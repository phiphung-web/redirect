limit_req_zone $binary_remote_addr zone=admin_login:10m rate=10r/m;

server {
    listen 80;
    server_name 94.72.126.197;
    return 444;
}

server {
    listen 18443 ssl;
    server_name 94.72.126.197;

    if ($host != "94.72.126.197") { return 444; }

    ssl_certificate /etc/ssl/certs/redirect-pro-ip.crt;
    ssl_certificate_key /etc/ssl/private/redirect-pro-ip.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:4102;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /login {
        limit_req zone=admin_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:4102;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80 default_server;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/redirect-pro-acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:4101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/ssl/certs/redirect-pro-ip.crt;
    ssl_certificate_key /etc/ssl/private/redirect-pro-ip.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:RedirectTLS:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://127.0.0.1:4101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }
}
